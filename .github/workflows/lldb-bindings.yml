name: LLDB Ruby bindings

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  required-bindings:
    runs-on: macos-latest
    env:
      LXDB_REQUIRE_LLDB_BINDINGS: "1"
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install LLDB development files
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LLDB_DIR=$(brew --prefix llvm)" >> "$GITHUB_ENV"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Check LLDB Ruby bindings
        run: bundle exec exe/lxdb --check-lldb-bindings
      - name: Run integration with required bindings
        run: bundle exec rake integration
