name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Ruby specs (${{ matrix.os }}, Ruby ${{ matrix.ruby }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        ruby:
          - "3.3"
          - "3.4"
          - head

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install LLDB development files (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lldb-18 liblldb-18-dev
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          echo "LLDB_DIR=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      - name: Install LLDB development files (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LLDB_DIR=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: bundle exec rake test

  integration:
    name: LLDB integration
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install LLDB development files
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LLDB_DIR=$(brew --prefix llvm)" >> "$GITHUB_ENV"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Check LLDB Ruby bindings
        run: bundle exec exe/lxdb --check-lldb-bindings

      - run: bundle exec rake integration
